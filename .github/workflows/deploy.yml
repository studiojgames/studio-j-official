name: Deploy site.zip to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip site.zip into _site
        run: |
          mkdir -p _site
          if [ -f site.zip ]; then
            unzip -o site.zip -d _site
          else
            echo "site.zip not found, publishing repo files as-is"
            shopt -s extglob
            cp -r !(_site|.github) _site/ 2>/dev/null || true
          fi
          ls -la _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
